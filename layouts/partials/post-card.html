<article class="post-card">
  {{ if .Params.Image }}
    <img src="{{ .Params.Image }}" alt="{{ .Title }}" class="post-image">
  {{ end }}

  <div class="post-meta">
    {{ if .Params.Author }}<span>👤 {{ .Params.Author }}</span>{{ end }}
    <span>📅 {{ .Date.Format "Jan 02, 2006" }}</span>
  </div>

  <h2 class="post-title">{{ .Title }}</h2>

  <p class="post-description">{{ .Description | default (substr .Content 0 200) }}</p>

  {{ if .Params.Tags }}
    <div class="post-tags">
      {{ range .Params.Tags }}
        <span class="tag">#{{ . }}</span>
      {{ end }}
    </div>
  {{ end }}

  <a href="{{ .Permalink }}" class="read-more">Read More</a>
</article>
