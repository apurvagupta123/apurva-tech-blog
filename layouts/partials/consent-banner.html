<div id="consent-banner" class="consent-banner">
  <div class="consent-container">
    <div class="consent-content">
      <h3>Privacy & Cookies</h3>
      <p>We use cookies and similar technologies to show you relevant ads, analyze traffic, and improve your experience. By continuing to browse, you consent to our use of cookies and data collection.</p>
      <div class="consent-links">
        <a href="/privacy-policy" target="_blank">Learn More</a>
      </div>
    </div>
    <div class="consent-actions">
      <button id="consent-accept" class="consent-btn consent-accept-btn">Accept</button>
      <button id="consent-decline" class="consent-btn consent-decline-btn">Decline</button>
    </div>
  </div>
</div>

<style>
  .consent-banner {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(20, 20, 30, 0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(100, 200, 255, 0.2);
    padding: 20px;
    z-index: 9999;
    display: none;
    animation: slideUp 0.4s ease-out;
  }

  .consent-banner.show {
    display: block;
  }

  @keyframes slideUp {
    from {
      transform: translateY(100%);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .consent-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .consent-content {
    flex: 1;
    min-width: 250px;
  }

  .consent-content h3 {
    margin: 0 0 10px 0;
    color: #64c8ff;
    font-size: 16px;
    font-weight: 600;
  }

  .consent-content p {
    margin: 0;
    color: rgba(255, 255, 255, 0.8);
    font-size: 14px;
    line-height: 1.5;
  }

  .consent-links {
    margin-top: 10px;
  }

  .consent-links a {
    color: #64c8ff;
    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s;
  }

  .consent-links a:hover {
    color: #ffffff;
    text-decoration: underline;
  }

  .consent-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .consent-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .consent-accept-btn {
    background: linear-gradient(135deg, #64c8ff 0%, #4ab8f0 100%);
    color: #000;
  }

  .consent-accept-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(100, 200, 255, 0.3);
  }

  .consent-decline-btn {
    background: transparent;
    color: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(100, 200, 255, 0.3);
  }

  .consent-decline-btn:hover {
    color: #ffffff;
    border-color: rgba(100, 200, 255, 0.6);
  }

  @media (max-width: 768px) {
    .consent-container {
      flex-direction: column;
      align-items: stretch;
    }

    .consent-actions {
      justify-content: space-between;
    }

    .consent-btn {
      flex: 1;
      padding: 12px 16px;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const consentBanner = document.getElementById('consent-banner');
    const acceptBtn = document.getElementById('consent-accept');
    const declineBtn = document.getElementById('consent-decline');
    const consentKey = 'tech-lens-consent';

    // Check if user has already given consent
    if (!localStorage.getItem(consentKey)) {
      consentBanner.classList.add('show');
    }

    // Accept button
    acceptBtn.addEventListener('click', function() {
      localStorage.setItem(consentKey, 'accepted');
      consentBanner.classList.remove('show');
      // Track acceptance if you use analytics
      if (window.gtag) {
        gtag('consent', 'update', {
          'analytics_storage': 'granted',
          'ad_storage': 'granted'
        });
      }
    });

    // Decline button
    declineBtn.addEventListener('click', function() {
      localStorage.setItem(consentKey, 'declined');
      consentBanner.classList.remove('show');
    });
  });
</script>
