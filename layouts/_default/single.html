<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <meta name="description" content="{{ .Description | default .Summary }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { height: 100%; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.8;
            color: #1a1a2e;
            background: #1a1f3a;
            overflow-x: hidden;
        }
        
        /* Animated particle background */
        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1f3a 0%, #2a2f4a 25%, #1d2844 50%, #2a1f4a 75%, #1e2a3a 100%);
            background-size: 400% 400%;
            animation: gradient 20s ease infinite;
            z-index: 0;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            pointer-events: none;
            opacity: 0.3;
        }
        
        .particle::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 255, 0.9);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.8);
        }
        
        .content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container { 
            max-width: 850px; 
            margin: 0 auto;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            margin-bottom: 40px;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 10px 15px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        .back-link:hover {
            color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            border-color: rgba(0, 255, 255, 0.4);
            gap: 12px;
        }
        
        header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 60px 50px;
            border-radius: 16px;
            margin-bottom: 50px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            animation: slideDown 0.8s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        header h1 { 
            font-size: 2.8em; 
            color: #ffffff;
            margin-bottom: 25px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }
        
        .meta {
            display: flex;
            gap: 20px;
            color: rgba(0, 255, 255, 0.9);
            flex-wrap: wrap;
            font-weight: 500;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .featured-image {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: cover;
            margin: 50px 0;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 255, 255, 0.2);
            animation: slideUp 0.8s ease-out 0.2s backwards;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        article {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 60px 50px;
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            margin-bottom: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-out 0.3s backwards;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        article h2 {
            font-size: 2em;
            margin: 40px 0 20px 0;
            color: #ffffff;
            font-weight: 700;
        }
        
        article h3 {
            font-size: 1.5em;
            margin: 30px 0 15px 0;
            color: #ffffff;
            font-weight: 700;
        }
        
        article p {
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.9;
            font-size: 1.05em;
        }
        
        article ul, article ol {
            margin-left: 30px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        article li {
            margin-bottom: 12px;
        }
        
        article a {
            color: #00ffff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }
        
        article a:hover {
            color: #00ffdd;
            border-bottom-color: #00ffdd;
        }
        
        article blockquote {
            border-left: 4px solid #00ffff;
            padding-left: 25px;
            margin: 30px 0;
            font-style: italic;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 255, 255, 0.1);
            padding: 25px;
            border-radius: 8px;
            border-left: 4px solid #00ffff;
        }
        
        article code {
            background: rgba(0, 0, 0, 0.3);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #00ffdd;
            font-weight: 600;
        }
        
        article pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 25px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        article pre code {
            background: transparent;
            padding: 0;
            color: #00ffff;
        }
        
        .tags {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .tag {
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 0.9em;
            border: 1px solid rgba(0, 255, 255, 0.4);
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .tag:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.7);
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        
        footer { 
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 40px 30px; 
            border-radius: 16px;
            text-align: center; 
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        @media (max-width: 768px) {
            header, article {
                padding: 30px 20px;
            }
            header h1 { font-size: 1.8em; }
            article h2 { font-size: 1.5em; }
            article h3 { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="particle-bg">
        <div class="particles" id="particles"></div>
    </div>
    
    <div class="content">
        <div class="container">
            <a href="{{ .Site.BaseURL }}" class="back-link">← Back Home</a>
            
            <header>
                <h1>{{ .Title }}</h1>
                <div class="meta">
                    {{ if .Params.author }}
                        <div class="meta-item">
                            <span>👤</span>
                            <span>{{ .Params.author }}</span>
                        </div>
                    {{ end }}
                    <div class="meta-item">
                        <span>📅</span>
                        <span>{{ .Date.Format "January 2, 2006" }}</span>
                    </div>
                </div>
            </header>
            
            {{ if .Params.image }}
                <img src="{{ .Params.image }}" alt="{{ .Title }}" class="featured-image">
            {{ end }}
            
            <article>
                {{ .Content }}
            </article>
            
            {{ if .Params.tags }}
                <div class="tags">
                    {{ range .Params.tags }}
                        <span class="tag">#{{ . }}</span>
                    {{ end }}
                </div>
            {{ end }}
        </div>
    </div>

    <script>
        // Create animated particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 3 + 2;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = Math.random() * 20 + 10;
                const delay = Math.random() * 5;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = x + '%';
                particle.style.top = y + '%';
                particle.style.animation = `float ${duration}s linear ${delay}s infinite`;
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // Floating animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0% {
                    transform: translateY(0px) translateX(0px);
                    opacity: 0;
                }
                10% {
                    opacity: 0.8;
                }
                90% {
                    opacity: 0.8;
                }
                100% {
                    transform: translateY(-100vh) translateX(100px);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        createParticles();
    </script>
</body>
</html>
